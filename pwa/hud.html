<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Jarvis AI Assistant - Futuristic HUD Interface">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jarvis HUD">

    <title>JARVIS AI - HUD Interface</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- Futuristic HUD Styles -->
    <link rel="stylesheet" href="/css/jarvis-hud.css?v=1">

    <!-- Force Dark Theme Immediately -->
    <script>
        document.documentElement.style.backgroundColor = '#000000';
        document.documentElement.style.colorScheme = 'dark';
    </script>
</head>
<body>
    <div id="app">
        <!-- HUD Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">J.A.R.V.I.S</span>
                </h1>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">INITIALIZING...</span>
                </div>
                <button class="btn-continuous-toggle" id="btnContinuousToggle" title="Attiva/Disattiva modalità continua">
                    ⭕
                </button>
            </div>
        </header>

        <!-- Chat Container with Corner Brackets -->
        <main class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Welcome message -->
                <div class="message assistant-message">
                    <div class="message-avatar">J</div>
                    <div class="message-content">
                        <p>Sistema operativo attivo. Interfaccia HUD inizializzata. Come posso assisterti?</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- HUD Input Area -->
        <footer class="input-area">
            <div class="input-container">
                <button class="btn-icon" id="btnCamera" title="Acquisizione visiva">
                    📷
                </button>

                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="INSERIRE COMANDO..."
                        autocomplete="off"
                    >
                    <button class="btn-send" id="btnSend">
                        ➤
                    </button>
                </div>

                <button class="btn-voice" id="btnVoice" title="Input vocale (tieni premuto)">
                    <span class="voice-icon">🎤</span>
                    <span class="voice-pulse"></span>
                </button>

                <button class="btn-stop-continuous hidden" id="btnStopContinuous" title="Ferma e invia">
                    ⏹️
                </button>
            </div>
        </footer>

        <!-- Voice Recording Overlay - Holographic -->
        <div class="voice-overlay hidden" id="voiceOverlay">
            <div class="voice-modal">
                <div class="voice-animation">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring delay-1"></div>
                    <div class="pulse-ring delay-2"></div>
                    <button class="voice-button active" id="voiceButton">
                        🎤
                    </button>
                </div>
                <p class="voice-text" id="voiceText">ASCOLTO IN CORSO...</p>
                <p class="voice-transcript" id="voiceTranscript"></p>
                <button class="btn-cancel" id="btnCancelVoice">ANNULLA</button>
            </div>
        </div>

        <!-- Settings Panel - HUD Style -->
        <div class="settings-panel hidden" id="settingsPanel">
            <div class="settings-content">
                <div class="settings-header">
                    <h2>CONFIG</h2>
                    <button class="btn-close" id="btnCloseSettings">✕</button>
                </div>
                <div class="settings-body">
                    <div class="setting-item">
                        <label for="serverUrl">SERVER URL</label>
                        <input type="text" id="serverUrl" value="http://localhost:8000" placeholder="http://jarvis.local:8000">
                    </div>
                    <div class="setting-item">
                        <label for="userId">USER ID</label>
                        <input type="text" id="userId" value="" placeholder="Il tuo identificativo">
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="autoSpeak" checked>
                            Risposte vocali automatiche
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="darkMode" checked disabled>
                            Modalità HUD (sempre attiva)
                        </label>
                    </div>
                </div>
                <div class="settings-footer">
                    <button class="btn-primary" id="btnSaveSettings">SALVA CONFIG</button>
                </div>
            </div>
        </div>

        <!-- Floating Action Button - HUD Style -->
        <button class="fab" id="fabMenu" title="Configurazione">
            ⚙️
        </button>

        <!-- User Setup Modal - Holographic -->
        <div class="user-setup-modal hidden" id="userSetupModal">
            <div class="user-setup-content">
                <h2>⚡ ACCESSO</h2>
                <p>Identificazione utente richiesta. Inserisci il tuo nominativo per l'inizializzazione del sistema.</p>
                <input type="text" id="userSetupName" placeholder="IDENTIFICATIVO UTENTE" autocomplete="off">
                <button class="btn-primary" id="btnSaveUserName">INIZIALIZZA</button>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="/js/config.js?v=27"></script>
    <script src="/js/api.js?v=27"></script>
    <script src="/js/voice.js?v=27"></script>
    <script src="/js/ui.js?v=27"></script>
    <script src="/js/app.js?v=27"></script>

    <!-- Service Worker - DISABLED -->
    <script>
        // Unregister old service workers
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service Worker unregistered');
                }
            });
        }
    </script>
</body>
</html>
