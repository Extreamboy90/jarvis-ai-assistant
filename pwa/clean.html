<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Jarvis AI Assistant</title>

    <style>
        /* Inline CSS - NO CACHE */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-dark: #0a0a0f;
            --bg-gradient: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            background: var(--bg-dark) !important;
            color-scheme: dark;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient) !important;
            color: var(--text-primary) !important;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.25rem 1.5rem;
            flex-shrink: 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
        }

        .message-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
            color: var(--text-primary);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.25rem;
            padding: 0.875rem 1.25rem;
            max-width: 70%;
            color: var(--text-primary);
        }

        .input-area {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-top: 1px solid var(--glass-border);
            padding: 1.25rem 1.5rem;
            padding-bottom: calc(1.25rem + env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            overflow: hidden;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.25rem;
            color: #ffffff !important;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            -webkit-text-fill-color: #ffffff !important;
        }

        #messageInput::placeholder {
            color: var(--text-secondary) !important;
            opacity: 1 !important;
        }

        .btn-send {
            background: var(--accent-gradient);
            border: none;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
        }

        .btn-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">JARVIS CLEAN</span>
                </h1>
            </div>
        </header>

        <main class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <div class="message">
                    <div class="message-avatar">J</div>
                    <div class="message-content">
                        <p>✅ Vedi sfondo SCURO e testo BIANCO? Perfetto! Il CSS funziona.</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-container">
                <button class="btn-icon">📷</button>
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Scrivi qui... vedi il testo?"
                        value="TEST TESTO BIANCO"
                    >
                    <button class="btn-send">➤</button>
                </div>
                <button class="btn-icon">🎤</button>
            </div>
        </footer>
    </div>

    <script>
        // Forza tema scuro
        document.documentElement.style.backgroundColor = '#0a0a0f';
        document.documentElement.style.colorScheme = 'dark';
    </script>
</body>
</html>
