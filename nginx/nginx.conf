events {}

http {
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # PWA static files
        location / {
            proxy_pass http://pwa:3001;
            proxy_set_header Host $host;
        }

        # Orchestrator API + WebSocket (/chat /health /functions /memories /ws /ws/voice ...)
        location ~ ^/(chat|health|functions|memories|dashboard|ws) {
            proxy_pass http://orchestrator:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        # STT service
        location /stt/ {
            proxy_pass http://stt:8001/;
            proxy_set_header Host $host;
        }

        # TTS service
        location /tts/ {
            proxy_pass http://tts:8002/;
            proxy_set_header Host $host;
        }
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
