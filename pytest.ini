[pytest]
# Pytest configuration for Jarvis AI Assistant

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    requires_db: Tests requiring database connection
    requires_api: Tests requiring external API

# Coverage options (optional)
[coverage:run]
source = services/orchestrator
omit =
    */tests/*
    */venv/*
    */__pycache__/*
